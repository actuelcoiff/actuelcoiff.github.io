---
layout: default
---
<article>

  <section class="page-hero">
    <p class="section-sub">
      <a href="{{ '/actualites/' | relative_url }}"
         style="color:var(--color-page-sub); text-decoration:none;">← Actualités</a>
    </p>
    <h1 class="section-title">{{ page.title }}</h1>
    <div class="divider divider--center"></div>
    <p style="position:relative; color:rgba(255,255,255,0.55); font-size:0.82rem; letter-spacing:0.1em; text-transform:uppercase;">
      {{ page.date | date: "%d %B %Y" }}
      {% if page.location %} &nbsp;·&nbsp; {{ page.location }}{% endif %}
    </p>
  </section>

  <div class="post-body">
    <div class="post-body__inner">

      {% if page.image %}
      <img class="post-body__cover"
           src="{{ page.image | relative_url }}"
           alt="{{ page.image_alt | default: page.title }}" />
      {% endif %}

      {{ content }}

      <div class="post-body__footer">
        <a href="{{ '/actualites/' | relative_url }}" class="btn">← Retour aux actualités</a>
      </div>

    </div>
  </div>

</article>
